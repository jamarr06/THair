<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appointment | T H Air Conditioning, Inc</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">T H Air Conditioning, Inc</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="appointment.html">Appointment</a>
    <a href="fwa.html">FWA</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main class="page">
  <h1>Request Appointment</h1>

  <form class="form-box" action="https://formspree.io/f/mqejejea" method="POST">
    <input type="text" name="name" placeholder="Full Name" required>
    <input type="tel" name="phone" placeholder="Phone Number" required>
    <input type="text" name="address" placeholder="Service Address" required>

    <select name="service" required>
      <option value="">Select Service</option>
      <option>AC Repair</option>
      <option>AC Maintenance</option>
      <option>AC Installation</option>
      <option>Emergency Service</option>
    </select>

    <textarea name="reason" placeholder="Reason for scheduling / Describe issue" required></textarea>

    <input type="date" name="preferred_date">

    <button type="submit">Submit Request</button>
  </form>
</main>

</body>
</html>
